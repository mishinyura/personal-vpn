version: '1.0.0'

services:
  openvpn:
    image: kylemanna/openvpn
    container_name: openvpn
    cap_add:
      - NET_ADMIN
    ports:
      - "443:1194/udp"
    volumes:
      - ./openvpn:/etc/openvpn
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: vpn-nginx
    ports:
      - "8088:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    restart: unless-stopped
